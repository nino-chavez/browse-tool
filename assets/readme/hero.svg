<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="100%" role="img" aria-label="browse-tool terminal: a short shell session (browse-start, browse-nav, browse-eval returning Hacker News) beside a token-budget comparison — Playwright MCP 13.7k, Chrome DevTools MCP 18.0k, browse-tool about 0.3k, loaded only when needed.">
  <title>browse-tool — a browser your coding agent drives from bash, for a few hundred tokens instead of MCP's 13-18k</title>

  <!-- terminal card -->
  <rect x="8" y="8" width="1184" height="404" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

  <!-- title bar -->
  <circle cx="40" cy="44" r="7" fill="#ff5f56"/>
  <circle cx="64" cy="44" r="7" fill="#ffbd2e"/>
  <circle cx="88" cy="44" r="7" fill="#27c93f"/>
  <text x="600" y="49" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#8b949e">browse-tool — a browser your agent drives from bash</text>
  <line x1="8" y1="72" x2="1192" y2="72" stroke="#30363d" stroke-width="1.5"/>

  <!-- left column: real session -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">
    <text x="40" y="124" fill="#c9d1d9"><tspan fill="#3fb950">$ </tspan>browse-start</text>
    <text x="40" y="162" fill="#c9d1d9"><tspan fill="#3fb950">$ </tspan>browse-nav news.ycombinator.com</text>
    <text x="40" y="200" fill="#c9d1d9"><tspan fill="#3fb950">$ </tspan>browse-eval <tspan fill="#a5d6ff">'return document.title'</tspan></text>
    <text x="40" y="238" fill="#8b949e">&#8594; "Hacker News"</text>
    <text x="40" y="302" fill="#3fb950">$ </text>
    <rect x="63" y="288" width="11" height="20" fill="#c9d1d9"/>
  </g>

  <!-- right column: token budget proof -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="700" y="112" font-size="13" letter-spacing="2" fill="#8b949e">TOKEN BUDGET, ALWAYS LOADED</text>

    <text x="700" y="152" font-size="15" fill="#c9d1d9">Playwright MCP</text>
    <text x="1160" y="152" font-size="14" text-anchor="end" fill="#8b949e">13.7k</text>
    <rect x="700" y="162" width="360" height="12" rx="6" fill="#21262d"/>
    <rect x="700" y="162" width="274" height="12" rx="6" fill="#f85149"/>

    <text x="700" y="214" font-size="15" fill="#c9d1d9">Chrome DevTools MCP</text>
    <text x="1160" y="214" font-size="14" text-anchor="end" fill="#8b949e">18.0k</text>
    <rect x="700" y="224" width="360" height="12" rx="6" fill="#21262d"/>
    <rect x="700" y="224" width="360" height="12" rx="6" fill="#f85149"/>

    <text x="700" y="276" font-size="15" fill="#3fb950">browse-tool</text>
    <text x="1160" y="276" font-size="14" text-anchor="end" fill="#3fb950">~0.3k</text>
    <rect x="700" y="286" width="360" height="12" rx="6" fill="#21262d"/>
    <rect x="700" y="286" width="10" height="12" rx="6" fill="#3fb950"/>

    <text x="700" y="332" font-size="13" fill="#6e7681">loaded only when the agent reads the README, not up front</text>
  </g>
</svg>
